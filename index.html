<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Notificação - Hub Municipal</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <section class="card-top">
      <div class="top-content">
        <h1 class="page-title">Nova Notificação</h1>
        <div class="btn-group">
          <button class="btn btn-agendar" onclick="finalizar()">Agendar</button>
          <button class="btn btn-cancelar">Cancelar</button>
        </div>
      </div>
    </section>

    <main class="main-card">
      <section class="models">
        <h2 class="title-section">Modelo e Destinatários</h2>
        <div class="grid-inputs">
          <div class="input-group">
            <label for="selectModelo"
              >Escolha um modelo <span class="req">*</span></label
            >
            <select id="selectModelo">
              <option value="">Carregando modelos...</option>
            </select>
          </div>

          <div class="input-group">
            <label>Selecione os Destinatários <span class="req">*</span></label>
            <select id="selectDestinatarios">
              <option value="">Selecione...</option>
              <option value="todos">Todos os Bairros (Cajamar)</option>
            </select>
          </div>
        </div>
      </section>

      <hr class="section-divider" />

      <section class="preview">
        <h2 class="title-section">Pré-visualização da Mensagem:</h2>
        <div id="previewMensagem" class="box-preview">
          Selecione um modelo para começar...
        </div>

        <div class="concatenated">
          <p id="textoSimples">Texto gerado...</p>
        </div>
        <div class="area-btn">
          <button class="btn btn-limpar" onclick="limparFormulario()">
            Limpar Conteúdo
          </button>
        </div>
      </section>

      <hr class="section-divider" />

      <section class="schedule">
        <div class="grid-scheduling">
          <div class="scheduling-block">
            <h2 class="title-section">Agendar disparo</h2>
            <div class="grid-row-three">
              <div class="input-group">
                <label>Data: <span class="req">*</span></label>
                <input type="date" />
              </div>

              <div class="input-group">
                <label>Hora: <span class="req">*</span></label>
                <input type="time" />
              </div>

              <div class="input-group">
                <label>Recorrência: <span class="req">*</span></label>
                <select>
                  <option>Apenas esta vez</option>
                </select>
              </div>
            </div>
          </div>

          <div class="scheduling-block">
            <h2 class="title-section">Validade da notificação</h2>
            <div class="grid-row-three">
              <div class="input-group">
                <label>Data: <span class="req">*</span></label>
                <input type="date" id="inputExpiraData" />
              </div>
              <div class="input-group">
                <label>Hora: <span class="req">*</span></label>
                <input type="time" id="inputExpiraHora" />
              </div>
              <div class="input-group">
                <label>Deixar no APP por:<span class="req">*</span></label>
                <select>
                  <option>1 dia</option>
                  <option>3 dias</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="infoBlock" style="display: none">
        <hr class="section-divider" />
        <h2 class="title-section">Insira as informações</h2>
        <div id="containerDynamicInputs" class="dynamic-inputs"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
